<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png?rev=40">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://pro.fontawesome.com/releases/v5.10.2/css/all.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel='stylesheet' href='style.css'>
</head>
<body class="d-flex flex-column justify-content-center align-items-center vh-100">

    <div class="glass-box p-4 p-md-5 mx-3 mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold">SENA</h2>
            <h4 class="mb-3">Bienvenido al CCyS</h4>
            <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png?rev=40" class="logosena mb-3" alt="Logo SENA">
            <h5 class="fw-light">Iniciar Sesión</h5>
        </div>

        <form>
            <div class="user-box">
                <input type="text" name="username" required>
                <label>Usuario</label>
            </div>
            <div class="user-box">
                <input type="password" name="password" required>
                <label>Contraseña</label>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-glow w-100 fw-bold" type="submit" >Ingresar</button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="mb-1 text-light">¿No estás registrado? <a href="/register.html" class="custom-link fw-bold">¡Regístrate aquí!</a></p>
            <p class="mb-3 text-light">¿Olvidaste tu contraseña? <a href="/password.html" class="custom-link fw-bold">Recuperar Contraseña</a></p>
            
            <p class="mb-2 text-light">Otros métodos de inicio de sesión:</p>
            <div class="d-grid gap-2">
            <button class="btn btn-glow w-100" type="button"><a href="/fingerprint.html" class="custom-link fw-bold">HUELLA</a></button>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-3 text-center w-100">
        <p class="footer-text mb-0">© 2026 SENA & SCS. Todos los derechos reservados.</p>
    </footer>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="function.js"></script>
</body>
</html>
