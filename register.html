<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA - Registro</title>
    <link rel="icon" type="image/png" href="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png?rev=40">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://pro.fontawesome.com/releases/v5.10.2/css/all.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel='stylesheet' href='style.css'>
</head>
<body class="d-flex flex-column justify-content-center align-items-center min-vh-100 py-4">

    <div class="glass-box register-box p-4 p-md-5 mx-3">
        <div class="text-center mb-4">
            <h2 class="fw-bold">SENA ACCESS</h2>
            <h4 class="mb-3">Registro</h4>
            <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png?rev=40" class="logosena mb-3" alt="Logo SENA">
            <h5 class="fw-light">Por favor, llene correctamente los siguientes datos</h5>
        </div>

        <form>
            <div class="row">
                <div class="col-md-6 user-box">
                    <input type="text" name="nombres" required>
                    <label>Nombres</label>
                </div>
                <div class="col-md-6 user-box">
                    <input type="text" name="apellidos" required>
                    <label>Apellidos</label>
                </div>
                <div class="col-md-6 user-box">
                    <input type="text" name="documento" required>
                    <label>Número de identificación</label>
                </div>
                <div class="col-md-6 user-box">
                    <input type="email" name="email" required>
                    <label>Correo electrónico</label>
                </div>
                <div class="col-md-6 user-box">
                    <input type="password" name="password" required>
                    <label>Crear contraseña</label>
                    <small class="text-light opacity-50 d-block mt-1">Mín. 1 dígito, 1 minúscula, 1 carácter especial.</small>
                </div>
                <div class="col-md-6 user-box">
                    <input type="password" name="confirm_password" required>
                    <label>Confirmar contraseña</label>
                </div>
            </div>

            <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
                <button class="btn btn-glow w-100 fw-bold" type="submit">Registrarse</button>
                <a href="/login.html" class="btn btn-glow w-100 text-center">Iniciar Sesión</a>
            </div>
        </form>
    </div>

    <footer class="mt-auto py-3 text-center w-100">
        <p class="footer-text mb-0">© 2026 SENA & SCS. Todos los derechos reservados.</p>
    </footer>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="function.js"></script>
</body>
</html>
